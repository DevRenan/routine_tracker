services:
  - type: web
    name: routine-tracker
    runtime: ruby
    plan: free

    buildCommand: |
      bundle install
      bundle exec rails db:migrate
      bundle exec rails db:seed

    startCommand: |
      bundle exec rails server -b 0.0.0.0 -p $PORT

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: routine-tracker-db
          property: connectionString

      - key: RAILS_ENV
        value: production

      - key: RAILS_MASTER_KEY
        sync: false

databases:
  - name: routine-tracker-db
    plan: free